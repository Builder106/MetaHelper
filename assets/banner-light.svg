<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420" role="img" aria-label="MetaHelper — See the problem. Hear the solution.">
  <title>MetaHelper — See the problem. Hear the solution.</title>
  <defs>
    <linearGradient id="bgL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.55" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="accentL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#818CF8"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
    <radialGradient id="glowL" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6366F1" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <style>
      .wm { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
      .mono { font-family: ui-monospace, "SF Mono", "JetBrains Mono", "Fira Code", Menlo, Consolas, monospace; }
    </style>
  </defs>

  <!-- background -->
  <rect width="1200" height="420" fill="url(#bgL)"/>
  <circle cx="200" cy="170" r="320" fill="url(#glowL)"/>

  <!-- faint dotted grid motif, right side -->
  <g fill="#6366F1" fill-opacity="0.14">
    <g>
      <circle cx="820" cy="70" r="2"/><circle cx="860" cy="70" r="2"/><circle cx="900" cy="70" r="2"/><circle cx="940" cy="70" r="2"/><circle cx="980" cy="70" r="2"/><circle cx="1020" cy="70" r="2"/><circle cx="1060" cy="70" r="2"/><circle cx="1100" cy="70" r="2"/><circle cx="1140" cy="70" r="2"/>
      <circle cx="820" cy="110" r="2"/><circle cx="860" cy="110" r="2"/><circle cx="900" cy="110" r="2"/><circle cx="940" cy="110" r="2"/><circle cx="980" cy="110" r="2"/><circle cx="1020" cy="110" r="2"/><circle cx="1060" cy="110" r="2"/><circle cx="1100" cy="110" r="2"/><circle cx="1140" cy="110" r="2"/>
      <circle cx="820" cy="310" r="2"/><circle cx="860" cy="310" r="2"/><circle cx="900" cy="310" r="2"/><circle cx="940" cy="310" r="2"/><circle cx="980" cy="310" r="2"/><circle cx="1020" cy="310" r="2"/><circle cx="1060" cy="310" r="2"/><circle cx="1100" cy="310" r="2"/><circle cx="1140" cy="310" r="2"/>
      <circle cx="820" cy="350" r="2"/><circle cx="860" cy="350" r="2"/><circle cx="900" cy="350" r="2"/><circle cx="940" cy="350" r="2"/><circle cx="980" cy="350" r="2"/><circle cx="1020" cy="350" r="2"/><circle cx="1060" cy="350" r="2"/><circle cx="1100" cy="350" r="2"/><circle cx="1140" cy="350" r="2"/>
    </g>
  </g>

  <!-- faint code snippet motif, right side -->
  <g class="mono" font-size="17" fill="#4338CA" fill-opacity="0.28">
    <text x="828" y="170">int solve(char *q) {</text>
    <text x="852" y="198">read(q);   <tspan fill-opacity="0.6">// see</tspan></text>
    <text x="852" y="226">return speak(q); <tspan fill-opacity="0.6">// hear</tspan></text>
    <text x="828" y="254">}</text>
  </g>

  <!-- logo mark, left -->
  <g transform="translate(70, 128) scale(2.6)">
    <rect x="2" y="2" width="60" height="60" rx="15" fill="#0B0F1A"/>
    <rect x="2.5" y="2.5" width="59" height="59" rx="14.5" fill="none" stroke="#6366F1" stroke-opacity="0.45" stroke-width="1"/>
    <g fill="none" stroke="url(#accentL)" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round">
      <rect x="8.5" y="22" width="20" height="20" rx="7"/>
      <rect x="35.5" y="22" width="20" height="20" rx="7"/>
      <path d="M28.5 30 Q32 27 35.5 30"/>
      <path d="M8.5 30 L3.5 27.5"/>
      <path d="M55.5 30 L60.5 27.5"/>
    </g>
    <g fill="none" stroke="#E0E7FF" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 28 L15.5 32 L21 36"/>
      <path d="M43 28 L48.5 32 L43 36"/>
    </g>
    <path d="M35 26 L29 38" fill="none" stroke="#A5B4FC" stroke-width="2.6" stroke-linecap="round"/>
  </g>

  <!-- wordmark + tagline -->
  <g class="wm">
    <text x="296" y="206" font-size="86" font-weight="700" letter-spacing="-2" fill="#0B0F1A">Meta<tspan fill="#6366F1">Helper</tspan></text>
    <text x="300" y="256" font-size="29" font-weight="500" letter-spacing="0.4" fill="#475569">See the problem. Hear the solution.</text>
    <text x="300" y="298" class="mono" font-size="16" letter-spacing="1" fill="#6366F1" fill-opacity="0.95">AI CODING ASSISTANT FOR META RAY-BAN GLASSES</text>
  </g>
</svg>
